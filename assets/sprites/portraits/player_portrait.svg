<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 192" width="128" height="192">
  <!-- Background -->
  <rect width="128" height="192" fill="#0d0d1f"/>

  <!-- Legs -->
  <rect x="46" y="158" width="14" height="34" fill="#1e1450" rx="3"/>
  <rect x="68" y="158" width="14" height="34" fill="#1e1450" rx="3"/>
  <!-- Boots -->
  <rect x="44" y="178" width="18" height="14" fill="#3a2010" rx="3"/>
  <rect x="66" y="178" width="18" height="14" fill="#3a2010" rx="3"/>

  <!-- Body (tunic) -->
  <rect x="40" y="106" width="48" height="56" fill="#3a2c8a" rx="5"/>
  <!-- Arms -->
  <rect x="22" y="108" width="20" height="40" fill="#3a2c8a" rx="5"/>
  <rect x="86" y="108" width="20" height="40" fill="#3a2c8a" rx="5"/>
  <!-- Hands -->
  <ellipse cx="32" cy="150" rx="8" ry="9" fill="#e8c4a0"/>
  <ellipse cx="96" cy="150" rx="8" ry="9" fill="#e8c4a0"/>

  <!-- Belt -->
  <rect x="40" y="146" width="48" height="8" fill="#7a5a1a" rx="2"/>
  <rect x="58" y="145" width="12" height="10" fill="#c49a28" rx="2"/>

  <!-- Neck -->
  <rect x="56" y="94" width="16" height="16" fill="#e8c4a0"/>

  <!-- Hair back -->
  <ellipse cx="64" cy="68" rx="26" ry="18" fill="#3a2010"/>

  <!-- Head -->
  <ellipse cx="64" cy="78" rx="24" ry="26" fill="#e8c4a0"/>

  <!-- Hair top/fringe -->
  <ellipse cx="64" cy="56" rx="26" ry="16" fill="#3a2010"/>
  <rect x="38" y="55" width="10" height="30" fill="#3a2010" rx="5"/>
  <rect x="80" y="55" width="10" height="30" fill="#3a2010" rx="5"/>
  <!-- Fringe strands -->
  <ellipse cx="50" cy="68" rx="5" ry="10" fill="#3a2010"/>
  <ellipse cx="60" cy="65" rx="5" ry="10" fill="#3a2010"/>
  <ellipse cx="70" cy="65" rx="5" ry="10" fill="#3a2010"/>

  <!-- Eyes -->
  <ellipse cx="54" cy="78" rx="5" ry="6" fill="#1a1a2a"/>
  <ellipse cx="74" cy="78" rx="5" ry="6" fill="#1a1a2a"/>
  <!-- Irises -->
  <ellipse cx="54" cy="79" rx="3" ry="3.5" fill="#5580ff"/>
  <ellipse cx="74" cy="79" rx="3" ry="3.5" fill="#5580ff"/>
  <!-- Pupils -->
  <ellipse cx="54" cy="79" rx="1.5" ry="2" fill="#0a0a1a"/>
  <ellipse cx="74" cy="79" rx="1.5" ry="2" fill="#0a0a1a"/>
  <!-- Eye shine -->
  <circle cx="55.5" cy="77.5" r="1" fill="white" opacity="0.8"/>
  <circle cx="75.5" cy="77.5" r="1" fill="white" opacity="0.8"/>

  <!-- Eyebrows -->
  <path d="M 48 71 Q 53 69 58 71" stroke="#3a2010" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 70 71 Q 75 69 80 71" stroke="#3a2010" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M 63 84 L 61 90 L 67 90" stroke="#c09070" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Mouth (slight smile) -->
  <path d="M 57 96 Q 64 100 71 96" stroke="#c09070" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</svg>
