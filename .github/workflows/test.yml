name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Run NUnit tests
        run: dotnet test SennenRpg.Tests/SennenRpg.Tests.csproj --verbosity normal

  gdunit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install Godot 4.6.1 (.NET)
        uses: chickensoft-games/setup-godot@v3
        with:
          version: 4.6.1
          use-dotnet: true

      - name: Import Godot project (generates .sln and imports resources)
        run: godot --headless --import

      - name: Build C# solution via Godot
        run: godot --headless --build-solutions --quit

      - name: Run GdUnit4 tests (headless)
        run: godot --headless -s addons/gdUnit4/bin/GdUnitCmdTool.gd -d res://tests/gdunit/
        timeout-minutes: 5
